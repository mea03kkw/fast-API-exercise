<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Management</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>Item Management</h1>
    
    <div class="form-container">
        <h2>Add/Update Item</h2>
        <form id="itemForm">
            <label for="item_id">Item ID:</label>
            <input type="number" id="item_id" name="item_id" required>
            
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" minlength="2" required>
            
            <label for="price">Price:</label>
            <input type="number" id="price" name="price" step="0.01" min="0.01" required>
            
            <label for="in_stock">
                <input type="checkbox" id="in_stock" name="in_stock" checked>
                In Stock
            </label>
            
            <div class="buttons">
                <button type="button" onclick="saveItem()">Save (POST)</button>
                <button type="button" onclick="deleteItem()">Delete</button>
                <button type="button" onclick="loadItems()">Refresh</button>
            </div>
        </form>
    </div>
    
    <div class="table-container">
        <h2>Current Items</h2>
        <table id="itemsTable">
            <thead>
                <tr>
                    <th>Item ID</th>
                    <th>Name</th>
                    <th>Price</th>
                    <th>In Stock</th>
                </tr>
            </thead>
            <tbody id="itemsBody">
                <!-- Items will be loaded here -->
            </tbody>
        </table>
    </div>
    
    <script src="/static/app.js"></script>
    <script>
        // Load items on page load
        loadItems();
    </script>
</body>
</html>
